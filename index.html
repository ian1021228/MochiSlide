<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MochiSlide 麻糬簡報 | 可愛又強大的 AI 簡報轉換器</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍡</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mochi: { 50: '#FFFDF9', 100: '#FDF8F0', 200: '#F5EBE0', 300: '#E8D5C4', 400: '#D4B89F' },
                        choco: { 800: '#5C4A3D', 900: '#4A3B31' },
                        matcha: { DEFAULT: '#88A07A', hover: '#738C66' },
                        peach: { DEFAULT: '#F4A298' }
                    },
                    fontFamily: {
                        sans: ['Nunito', '"M PLUS Rounded 1c"', 'sans-serif'],
                        rounded: ['"M PLUS Rounded 1c"', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'bounce-slight': 'bounceSlight 2s infinite ease-in-out',
                        'pop-in': 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        bounceSlight: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-6px)' } },
                        popIn: { '0%': { opacity: '0', transform: 'scale(0.9)' }, '100%': { opacity: '1', transform: 'scale(1)' } }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #FFFDF9; color: #5C4A3D; }
        .upload-dashed-border {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='32' ry='32' stroke='%23E8D5C4' stroke-width='3' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='round'/%3e%3c/svg%3e");
            border-radius: 32px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .upload-dashed-border.dragover {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='%23FDF8F0' rx='32' ry='32' stroke='%2388A07A' stroke-width='3' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='round'/%3e%3c/svg%3e");
            transform: scale(1.03) translateY(-4px); box-shadow: 0 20px 40px rgba(136, 160, 122, 0.15);
        }
        .cute-spinner {
            width: 24px; height: 24px; border: 4px solid rgba(136, 160, 122, 0.2); border-top-color: #88A07A; border-radius: 50%;
            animation: spin 1s infinite cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col font-sans selection:bg-matcha selection:text-white">

    <div id="toast" class="fixed top-6 right-6 z-50 bg-choco-900 text-white px-6 py-3.5 rounded-2xl shadow-xl font-bold flex items-center gap-3 transition-all transform translate-y-[-100px] opacity-0">
        <i class="ph-bold ph-bell text-matcha text-xl"></i>
        <span id="toastText">訊息提示</span>
    </div>

    <header class="w-full py-6 px-8 flex justify-between items-center max-w-6xl mx-auto">
        <div class="flex items-center gap-2 text-choco-900 group cursor-pointer" onclick="location.reload()">
            <div class="bg-matcha text-white p-2 rounded-2xl group-hover:rotate-12 transition-transform duration-300">
                <i class="ph-bold ph-ghost text-2xl"></i>
            </div>
            <span class="font-rounded font-extrabold text-2xl tracking-wide">MochiSlide</span>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="openSettings()" class="p-2.5 bg-mochi-100 hover:bg-mochi-200 rounded-full text-choco-800 transition-colors border border-mochi-200" title="配置後端 API 網址">
                <i class="ph-bold ph-gear-six text-xl"></i>
            </button>
            <div class="px-4 py-2 bg-mochi-100 rounded-full text-sm text-choco-800 font-bold border border-mochi-200">
                免登入・智慧轉換 ✨
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center px-4 sm:px-6 w-full max-w-5xl mx-auto">
        
        <section class="text-center mt-10 mb-10 animate-fade-in">
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-rounded font-extrabold text-choco-900 leading-[1.3] mb-6">
                把硬梆梆的 PDF <br class="hidden md:block"/>
                變成 <span class="relative inline-block px-2">
                    <span class="relative z-10 text-matcha">軟QQ的</span>
                    <span class="absolute bottom-2 left-0 w-full h-4 bg-matcha/20 -z-10 rounded-full"></span>
                </span> 智慧簡報
            </h1>
            <p class="text-lg text-choco-800 max-w-2xl mx-auto font-medium leading-relaxed opacity-90">
                自動過濾 NotebookLM 背景格線與浮水印文字。<br/>
                轉換後的簡報可以自由打字、換行、移動圖表，就是這麼神奇！
            </p>
        </section>

        <section class="w-full max-w-3xl mb-20 animate-fade-in" style="animation-delay: 0.2s;">
            <div id="dropzone" class="upload-dashed-border bg-white cursor-pointer relative p-12 md:p-24 flex flex-col items-center justify-center text-center group hover:bg-mochi-50">
                <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" accept=".pdf" title="">
                
                <div class="pointer-events-none w-20 h-20 bg-mochi-100 text-matcha rounded-[2rem] flex items-center justify-center mb-6 animate-bounce-slight shadow-sm border border-mochi-200">
                    <i class="ph-bold ph-cloud-arrow-up text-4xl"></i>
                </div>
                
                <h3 class="pointer-events-none text-2xl font-rounded font-extrabold text-choco-900 mb-3">把簡報檔案丟進來吧！</h3>
                <p class="pointer-events-none text-choco-800 opacity-70 font-bold mb-4">支援包含文字層的 PDF (點擊或拖曳皆可)</p>
            </div>

            <!-- 進度追蹤區塊 -->
            <div id="processingArea" class="hidden bg-white border-2 border-mochi-200 rounded-[2rem] p-10 shadow-lg mt-8 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-mochi-200">
                    <div id="progressBar" class="h-full bg-matcha w-0 transition-all duration-300 rounded-r-full"></div>
                </div>

                <div class="flex items-center gap-5 mb-8">
                    <div class="p-4 bg-mochi-100 rounded-2xl text-matcha shadow-inner">
                        <i class="ph-fill ph-magic-wand text-3xl animate-pulse"></i>
                    </div>
                    <div>
                        <h4 class="font-rounded font-extrabold text-xl text-choco-900">AI 魔法轉換中...</h4>
                        <p class="text-sm font-bold text-choco-800 opacity-70" id="currentFileName">file.pdf</p>
                    </div>
                </div>

                <div class="space-y-5">
                    <div class="flex items-center gap-4 text-base font-bold" id="step1">
                        <div class="step-icon w-8 h-8 flex items-center justify-center bg-mochi-100 rounded-full"><div class="cute-spinner"></div></div>
                        <span class="step-text text-choco-900" id="progressStatusText">正在喚醒雲端伺服器 (若主機休眠約需等候 50 秒)...</span>
                    </div>
                </div>
            </div>

            <div id="successArea" class="hidden bg-white border-2 border-matcha/30 rounded-[2rem] p-12 shadow-xl shadow-matcha/10 mt-8 text-center flex flex-col items-center relative overflow-hidden">
                <div class="w-20 h-20 bg-matcha text-white rounded-full flex items-center justify-center mb-5 shadow-lg shadow-matcha/40">
                    <i class="ph-bold ph-check text-4xl"></i>
                </div>
                <h4 class="font-rounded font-extrabold text-3xl text-choco-900 mb-3">轉換大成功！</h4>
                <a id="downloadBtn" href="#" class="bg-matcha hover:bg-matcha-hover text-white px-10 py-4 rounded-full font-extrabold text-lg transition-all flex items-center gap-3 shadow-xl shadow-matcha/30 hover:-translate-y-1 hover:shadow-2xl">
                    <i class="ph-bold ph-download-simple text-2xl"></i> 立即下載 PPTX
                </a>
                <button onclick="resetApp()" class="mt-6 text-sm font-bold text-choco-800 underline decoration-mochi-300 underline-offset-4 hover:text-matcha transition-colors">再轉換另一份檔案</button>
            </div>
        </section>

        <!-- 設定視窗 -->
        <div id="settingsModal" class="fixed inset-0 bg-choco-900/40 backdrop-blur-sm z-50 flex items-center justify-center hidden">
            <div class="bg-white rounded-[2rem] border-4 border-mochi-200 p-8 w-full max-w-md mx-4 shadow-2xl relative animate-pop-in">
                <button onclick="closeSettings()" class="absolute top-6 right-6 text-choco-800 hover:text-peach transition-colors"><i class="ph-bold ph-x text-2xl"></i></button>
                <h3 class="font-rounded font-extrabold text-2xl text-choco-900 mb-4 flex items-center gap-2"><i class="ph-fill ph-gear-six text-matcha"></i> 伺服器設定</h3>
                <input type="url" id="backendUrlInput" placeholder="https://your-backend.onrender.com" class="w-full px-4 py-3 bg-mochi-50 rounded-2xl border-2 border-mochi-200 focus:border-matcha outline-none font-bold text-sm text-choco-900 transition-colors">
                <div class="mt-8 flex gap-3">
                    <button onclick="saveSettings()" class="flex-1 py-3 bg-matcha hover:bg-matcha-hover text-white font-extrabold rounded-2xl transition-all shadow-md shadow-matcha/20">儲存設定</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const processingArea = document.getElementById('processingArea');
        const successArea = document.getElementById('successArea');
        const currentFileName = document.getElementById('currentFileName');
        const progressBar = document.getElementById('progressBar');
        const settingsModal = document.getElementById('settingsModal');
        const backendUrlInput = document.getElementById('backendUrlInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const progressStatusText = document.getElementById('progressStatusText');

        window.addEventListener('load', () => {
            const savedUrl = localStorage.getItem('mochislide_backend_url');
            if (savedUrl) backendUrlInput.value = savedUrl;
            else { showToast("請先設定您的後端 API 網址喔！"); setTimeout(openSettings, 800); }
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').textContent = message;
            toast.style.transform = 'translateY(0)'; toast.style.opacity = '1';
            setTimeout(() => { toast.style.transform = 'translateY(-100px)'; toast.style.opacity = '0'; }, 4000);
        }

        function openSettings() { settingsModal.classList.remove('hidden'); }
        function closeSettings() { settingsModal.classList.add('hidden'); }
        function saveSettings() {
            let url = backendUrlInput.value.trim();
            if (url.endsWith('/')) url = url.slice(0, -1);
            localStorage.setItem('mochislide_backend_url', url);
            showToast("伺服器設定儲存成功！"); closeSettings();
        }

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });
        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
        ['dragenter', 'dragover'].forEach(eventName => dropzone.addEventListener(eventName, () => dropzone.classList.add('dragover'), false));
        ['dragleave', 'drop'].forEach(eventName => dropzone.addEventListener(eventName, () => dropzone.classList.remove('dragover'), false));

        dropzone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files), false);
        fileInput.addEventListener('change', function() { handleFiles(this.files); });

        async function handleFiles(files) {
            if (files.length === 0) return;
            const file = files[0];
            if (!file.name.toLowerCase().endsWith('.pdf')) { showToast("只支援 .pdf 格式喔！"); return; }

            const backendUrl = localStorage.getItem('mochislide_backend_url');
            if (!backendUrl) { openSettings(); return; }

            currentFileName.textContent = file.name;
            dropzone.classList.add('hidden');
            processingArea.classList.remove('hidden');
            
            progressBar.style.width = '10%';
            progressStatusText.textContent = "正在喚醒雲端伺服器...";
            
            try {
                // 1. 喚醒
                await fetch(`${backendUrl}/`);
                progressBar.style.width = '20%';
                progressStatusText.textContent = "伺服器已就緒！正在上傳檔案...";

                // 2. 建立背景任務
                const formData = new FormData();
                formData.append('file', file);
                
                // 注意：這裡改為呼叫 /api/upload
                const uploadRes = await fetch(`${backendUrl}/api/upload`, { method: 'POST', body: formData });
                if (!uploadRes.ok) throw new Error("上傳失敗");
                
                const { task_id } = await uploadRes.json();

                // 3. 每 2 秒詢問一次進度 (Polling 機制)
                let isPolling = true;
                while(isPolling) {
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    const statusRes = await fetch(`${backendUrl}/api/status/${task_id}`);
                    const statusData = await statusRes.json();

                    if (statusData.status === 'error') {
                        throw new Error(statusData.error);
                    }

                    // 即時更新進度文字給使用者看！
                    progressStatusText.textContent = statusData.progress;

                    // 動態計算進度條長度
                    if (statusData.total > 0) {
                        const percent = 20 + (statusData.current / statusData.total * 75);
                        progressBar.style.width = `${percent}%`;
                    }

                    // 4. 分析完成，啟動下載！
                    if (statusData.status === 'completed') {
                        isPolling = false;
                        progressBar.style.width = '100%';
                        
                        const downloadRes = await fetch(`${backendUrl}/api/download/${task_id}`);
                        const blob = await downloadRes.blob();
                        const downloadUrl = window.URL.createObjectURL(blob);
                        downloadBtn.href = downloadUrl;
                        downloadBtn.download = file.name.replace('.pdf', '_可編輯版.pptx');

                        setTimeout(() => {
                            processingArea.classList.add('hidden');
                            successArea.classList.remove('hidden');
                        }, 800);
                    }
                }

            } catch (err) {
                console.error(err);
                showToast(`轉換失敗: ${err.message}`);
                resetApp();
            }
        }

        function resetApp() {
            fileInput.value = '';
            successArea.classList.add('hidden');
            processingArea.classList.add('hidden');
            dropzone.classList.remove('hidden');
            progressBar.style.width = '0%';
        }
    </script>
</body>
</html>
