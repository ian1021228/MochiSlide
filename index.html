<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MochiSlide 麻糬簡報 | 完美去水版</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍡</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { mochi: { 100: '#FDF8F0', 200: '#F5EBE0' }, choco: { 800: '#5C4A3D', 900: '#4A3B31' }, matcha: { DEFAULT: '#88A07A', hover: '#738C66' }, peach: { DEFAULT: '#F4A298' } }, fontFamily: { sans: ['Nunito', '"M PLUS Rounded 1c"', 'sans-serif'], rounded: ['"M PLUS Rounded 1c"', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { background-color: #FFFDF9; color: #5C4A3D; }
        .upload-dashed-border { border-radius: 32px; border: 3px dashed #E8D5C4; transition: all 0.3s; }
        .upload-dashed-border.dragover { border-color: #88A07A; background-color: #FDF8F0; transform: scale(1.02); }
        .cute-spinner { width: 24px; height: 24px; border: 4px solid rgba(136,160,122,0.2); border-top-color: #88A07A; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center p-6">
    <div id="toast" class="fixed top-6 right-6 z-50 bg-choco-900 text-white px-6 py-3 rounded-2xl shadow-xl font-bold transition-all transform translate-y-[-100px] opacity-0"><span id="toastText">訊息</span></div>
    
    <header class="w-full max-w-5xl flex justify-between items-center py-6 mb-10">
        <div class="flex items-center gap-2 font-rounded font-extrabold text-2xl"><div class="bg-matcha text-white p-2 rounded-2xl"><i class="ph-bold ph-ghost"></i></div> MochiSlide</div>
        <button onclick="document.getElementById('settingsModal').classList.remove('hidden')" class="p-2.5 bg-mochi-100 rounded-full hover:bg-mochi-200"><i class="ph-bold ph-gear-six text-xl"></i></button>
    </header>

    <main class="w-full max-w-3xl flex flex-col items-center">
        <h1 class="text-4xl md:text-5xl font-rounded font-extrabold text-choco-900 text-center mb-6 leading-tight">把 PDF 變成<br><span class="text-matcha">軟QQ的</span> 智慧簡報</h1>
        <p class="text-choco-800 text-center font-bold mb-10 opacity-80">100% 幾何拆解。保留背景，文字全解鎖，浮水印徹底消失。</p>

        <div id="dropzone" onclick="document.getElementById('fileInput').click()" class="upload-dashed-border w-full bg-white cursor-pointer p-16 flex flex-col items-center text-center hover:bg-mochi-50">
            <input type="file" id="fileInput" class="hidden" accept=".pdf">
            <div class="w-20 h-20 bg-mochi-100 text-matcha rounded-[2rem] flex items-center justify-center mb-6"><i class="ph-bold ph-cloud-arrow-up text-4xl"></i></div>
            <h3 class="text-2xl font-rounded font-extrabold text-choco-900">把 PDF 檔案丟進來吧！</h3>
        </div>

        <div id="processingArea" class="hidden w-full bg-white border-2 border-mochi-200 rounded-[2rem] p-10 mt-8 shadow-lg relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-mochi-200"><div id="progressBar" class="h-full bg-matcha w-0 transition-all"></div></div>
            <div class="flex items-center gap-4 mb-6">
                <div class="p-4 bg-mochi-100 rounded-2xl text-matcha"><i class="ph-fill ph-magic-wand text-3xl animate-pulse"></i></div>
                <div><h4 class="font-rounded font-extrabold text-xl text-choco-900">幾何拆解中...</h4><p class="text-sm font-bold text-choco-800 opacity-70" id="currentFileName">file.pdf</p></div>
            </div>
            <div class="flex items-center gap-3 font-bold"><div class="cute-spinner"></div><span id="progressStatusText" class="text-choco-900">喚醒伺服器...</span></div>
        </div>

        <div id="successArea" class="hidden w-full bg-white border-2 border-matcha/30 rounded-[2rem] p-12 mt-8 text-center flex flex-col items-center">
            <div class="w-20 h-20 bg-matcha text-white rounded-full flex items-center justify-center mb-5"><i class="ph-bold ph-check text-4xl"></i></div>
            <h4 class="font-rounded font-extrabold text-3xl text-choco-900 mb-3">拆解大成功！</h4>
            <a id="downloadBtn" href="#" class="bg-matcha hover:bg-matcha-hover text-white px-10 py-4 rounded-full font-extrabold text-lg mt-6 shadow-xl flex gap-2"><i class="ph-bold ph-download-simple text-2xl"></i> 下載 PPTX</a>
            <button onclick="location.reload()" class="mt-6 text-sm font-bold text-choco-800 underline hover:text-matcha">再轉換一份</button>
        </div>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-choco-900/40 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-md mx-4 shadow-2xl">
            <h3 class="font-rounded font-extrabold text-2xl text-choco-900 mb-4">伺服器設定</h3>
            <input type="url" id="backendUrlInput" placeholder="https://your-backend.onrender.com" class="w-full px-4 py-3 bg-mochi-50 rounded-2xl border-2 border-mochi-200 outline-none font-bold text-choco-900">
            <div class="mt-8 flex gap-3">
                <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="flex-1 py-3 bg-mochi-100 text-choco-800 font-extrabold rounded-2xl">取消</button>
                <button onclick="saveSettings()" class="flex-1 py-3 bg-matcha text-white font-extrabold rounded-2xl">儲存</button>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const processingArea = document.getElementById('processingArea');
        const successArea = document.getElementById('successArea');
        const dropzone = document.getElementById('dropzone');
        
        window.onload = () => {
            const url = localStorage.getItem('mochislide_backend_url');
            if(url) document.getElementById('backendUrlInput').value = url;
            else document.getElementById('settingsModal').classList.remove('hidden');
        };

        function showToast(msg) {
            document.getElementById('toastText').textContent = msg;
            const t = document.getElementById('toast');
            t.style.transform = 'translateY(0)'; t.style.opacity = '1';
            setTimeout(() => { t.style.transform = 'translateY(-100px)'; t.style.opacity = '0'; }, 3000);
        }

        function saveSettings() {
            let url = document.getElementById('backendUrlInput').value.trim();
            if(url.endsWith('/')) url = url.slice(0, -1);
            localStorage.setItem('mochislide_backend_url', url);
            document.getElementById('settingsModal').classList.add('hidden');
            showToast("設定已儲存！");
        }

        dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
        dropzone.ondragleave = (e) => { e.preventDefault(); dropzone.classList.remove('dragover'); };
        dropzone.ondrop = (e) => { e.preventDefault(); dropzone.classList.remove('dragover'); handle(e.dataTransfer.files); };
        fileInput.onchange = (e) => handle(e.target.files);

        async function handle(files) {
            if(!files.length) return;
            const file = files[0];
            const url = localStorage.getItem('mochislide_backend_url');
            if(!url) return document.getElementById('settingsModal').classList.remove('hidden');

            dropzone.classList.add('hidden'); processingArea.classList.remove('hidden');
            document.getElementById('currentFileName').textContent = file.name;

            try {
                const fd = new FormData(); fd.append('file', file);
                const upRes = await fetch(`${url}/api/upload`, { method: 'POST', body: fd });
                const { task_id } = await upRes.json();

                let polling = true;
                while(polling) {
                    await new Promise(r => setTimeout(r, 1000));
                    const st = await (await fetch(`${url}/api/status/${task_id}`)).json();
                    document.getElementById('progressStatusText').textContent = st.progress;
                    if(st.total > 0) document.getElementById('progressBar').style.width = `${20 + (st.current/st.total*80)}%`;
                    
                    if(st.status === 'completed') {
                        polling = false;
                        const dl = await fetch(`${url}/api/download/${task_id}`);
                        const blob = await dl.blob();
                        const btn = document.getElementById('downloadBtn');
                        btn.href = URL.createObjectURL(blob);
                        // 🚨 鐵證防護：前端也鎖死檔名
                        btn.download = file.name.replace('.pdf', '_完美去水版.pptx');
                        processingArea.classList.add('hidden'); successArea.classList.remove('hidden');
                    } else if(st.status === 'error') throw new Error(st.error);
                }
            } catch(e) {
                showToast("失敗: " + e.message);
                setTimeout(() => location.reload(), 2000);
            }
        }
    </script>
</body>
</html>
